<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Tableau de bord | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
        <div class="brand mb-4 px-1"><img src="logo.png" alt="Ohipa"><span class="fw-bold fs-5">Ohipa</span></div>
        <ul class="nav flex-column gap-1">
          <li class="nav-item"><a class="nav-link active" href="admin-dashboard.html"><i class="bi bi-graph-up"></i>Tableau de bord</a></li>
          <li class="nav-item"><a class="nav-link" href="admin-users.html"><i class="bi bi-people"></i>Utilisateurs</a></li>
          <li class="nav-item"><a class="nav-link" href="admin-companies.html"><i class="bi bi-building"></i>Entreprises</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-bar-chart-line"></i>Rapports</a></li>
          <li class="nav-item mt-3"><a class="nav-link text-warning" href="dashboard.html"><i class="bi bi-arrow-left"></i>Espace utilisateur</a></li>
          <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i>Déconnexion</a></li>
        </ul>
      </nav>

      <main class="col-md-9 col-lg-10 ms-sm-auto p-4">
        <h2 class="mb-4"><i class="bi bi-graph-up me-2"></i>Tableau de bord administrateur</h2>
        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <div class="card stat-card p-3 shadow-sm">
              <small class="text-muted"><i class="bi bi-people me-1"></i>Utilisateurs</small>
              <h3 id="stat-users">0</h3>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card stat-card p-3 shadow-sm" style="border-left-color:#198754">
              <small class="text-muted"><i class="bi bi-building me-1"></i>Entreprises</small>
              <h3 id="stat-companies">0</h3>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card stat-card p-3 shadow-sm" style="border-left-color:#ffc107">
              <small class="text-muted"><i class="bi bi-clock me-1"></i>Total des heures</small>
              <h3 id="stat-hours">0h</h3>
            </div>
          </div>
        </div>

        <div class="card p-4 shadow-sm">
          <h5 class="mb-3"><i class="bi bi-activity me-2"></i>Activité récente</h5>
          <table class="table table-sm align-middle">
            <thead class="table-light">
              <tr><th>Date</th><th>Utilisateur</th><th>Entreprise</th><th>Heures</th></tr>
            </thead>
            <tbody id="recent-activity"></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/admin-dashboard.js"></script>
</body>
</html>
