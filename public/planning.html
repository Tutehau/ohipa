<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#05070f">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ohipa">
  <title>Planning | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <nav id="topnav" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"></nav>
  <div class="container">
    <h2 class="mb-4"><i class="bi bi-calendar-week me-2"></i>Mon planning</h2>
    <div id="alert" class="d-none" role="alert"></div>

    <div class="row g-3">
      <!-- Formulaire créneau -->
      <div class="col-md-5">
        <div class="card p-4 shadow-sm">
          <h5 class="mb-3" id="form-title"><i class="bi bi-plus-circle me-2"></i>Nouveau créneau</h5>
          <form id="slot-form">
            <input type="hidden" id="slot-id">
            <div class="mb-3">
              <label class="form-label">Société</label>
              <div class="input-group">
                <select id="company-select" class="form-select"></select>
                <button class="btn btn-outline-light" id="btn-add-company" type="button" title="Nouvelle société"><i class="bi bi-plus-lg"></i></button>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Date</label>
              <input type="date" id="slot-date" class="form-control" required>
            </div>
            <div class="row g-2 mb-3">
              <div class="col"><label class="form-label">Début</label><input type="time" id="slot-start" class="form-control" required></div>
              <div class="col"><label class="form-label">Fin</label><input type="time" id="slot-end" class="form-control" required></div>
            </div>
            <div class="mb-3">
              <label class="form-label">Note (optionnel)</label>
              <input type="text" id="slot-note" class="form-control" maxlength="300">
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-save me-1"></i><span id="submit-label">Ajouter</span></button>
              <button type="button" id="btn-cancel" class="btn btn-outline-light d-none">Annuler</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Liste des créneaux -->
      <div class="col-md-7">
        <div class="card p-4 shadow-sm">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>Créneaux prévus</h5>
            <span class="badge bg-primary fs-6" id="total-planned">0h</span>
          </div>
          <ul id="slots" class="list-group list-group-flush"></ul>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/planning.js"></script>
</body>
</html>
