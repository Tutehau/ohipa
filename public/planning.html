<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#05070f">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ohipa">
  <title>Planning | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <nav id="topnav" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"></nav>
  <div class="container pb-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
      <h2 class="mb-0"><i class="bi bi-calendar-week me-2"></i>Mon planning</h2>
      <button class="btn btn-primary" id="btn-new"><i class="bi bi-plus-lg me-1"></i>Nouveau créneau</button>
    </div>
    <div id="alert" class="alert-toast d-none" role="alert"></div>

    <div class="card p-3 p-md-4 shadow-sm">
      <div class="mb-3" style="max-width:260px">
        <label class="form-label small mb-1"><i class="bi bi-building me-1"></i>Entreprise affichée</label>
        <select id="plan-company" class="form-select form-select-sm">
          <option value="">Toutes les entreprises</option>
        </select>
      </div>
      <!-- Navigation de semaine -->
      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="btn-group btn-group-sm">
          <button class="btn btn-outline-light" id="week-prev"><i class="bi bi-chevron-left"></i></button>
          <button class="btn btn-outline-light" id="week-today">Cette semaine</button>
          <button class="btn btn-outline-light" id="week-next"><i class="bi bi-chevron-right"></i></button>
        </div>
        <div class="fw-semibold" id="week-label">—</div>
        <span class="badge bg-primary fs-6">Total <b id="week-total">0h</b></span>
      </div>
      <!-- Grille (desktop) -->
      <div class="cal-grid d-none d-md-grid" id="cal-grid"></div>

      <!-- Vue mobile : bande de jours + détail du jour sélectionné -->
      <div class="d-md-none" id="cal-mobile">
        <div class="day-strip" id="day-strip"></div>
        <div id="day-detail" class="mt-3"></div>
      </div>
    </div>
  </div>

  <!-- Modale ajout / édition -->
  <div class="modal fade" id="slot-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content card">
        <div class="modal-header border-0">
          <h5 class="modal-title" id="modal-title"><i class="bi bi-plus-circle me-2"></i>Nouveau créneau</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <form id="slot-form">
          <div class="modal-body">
            <input type="hidden" id="slot-id">
            <div class="mb-3">
              <label class="form-label">Société</label>
              <div class="input-group">
                <select id="slot-company" class="form-select"></select>
                <button class="btn btn-outline-light" id="btn-add-company" type="button"><i class="bi bi-plus-lg"></i></button>
              </div>
            </div>
            <div class="mb-3"><label class="form-label">Date</label><input type="date" id="slot-date" class="form-control" required></div>
            <div class="row g-2 mb-3">
              <div class="col"><label class="form-label">Début</label><input type="time" id="slot-start" class="form-control" required></div>
              <div class="col"><label class="form-label">Fin</label><input type="time" id="slot-end" class="form-control" required></div>
            </div>
            <div class="mb-3"><label class="form-label">Note (optionnel)</label><input type="text" id="slot-note" class="form-control" maxlength="300"></div>
          </div>
          <div class="modal-footer border-0 justify-content-between">
            <button type="button" id="btn-delete" class="btn btn-outline-danger d-none"><i class="bi bi-trash me-1"></i>Supprimer</button>
            <div class="d-flex gap-2 ms-auto">
              <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Annuler</button>
              <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Enregistrer</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/planning.js"></script>
</body>
</html>
