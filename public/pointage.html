<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#05070f">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ohipa">
  <title>Pointage | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <nav id="topnav" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"></nav>
  <div class="container pb-4">
    <h2 class="mb-4"><i class="bi bi-fingerprint me-2"></i>Pointage</h2>
    <div id="alert" class="alert-toast d-none" role="alert"></div>

    <div class="row g-3">
      <!-- HERO pointage -->
      <div class="col-lg-8">
        <div class="card hero-card p-4 shadow-sm h-100">
          <div class="row align-items-center g-4">
            <div class="col-sm-6 text-center text-sm-start">
              <div class="text-muted small mb-1"><i class="bi bi-clock me-1"></i>Statut</div>
              <div id="hero-status" class="fs-5 fw-semibold mb-1">—</div>
              <div id="hero-timer" class="hero-timer" style="font-variant-numeric:tabular-nums">00:00:00</div>
            </div>
            <div class="col-sm-6">
              <label class="form-label">Société</label>
              <div class="input-group mb-2">
                <select id="company-select" class="form-select"></select>
                <button class="btn btn-outline-light" id="btn-add-company" type="button" title="Nouvelle société"><i class="bi bi-plus-lg"></i></button>
              </div>
              <div class="d-grid gap-2">
                <button id="btn-in" class="btn btn-success btn-lg d-none"><i class="bi bi-box-arrow-in-right me-1"></i>Pointer l'arrivée</button>
                <button id="btn-resume" class="btn btn-success btn-lg d-none"><i class="bi bi-play-fill me-1"></i>Reprendre</button>
                <div class="row g-2">
                  <div class="col"><button id="btn-pause" class="btn btn-warning w-100 d-none"><i class="bi bi-pause-fill me-1"></i>Pause</button></div>
                  <div class="col"><button id="btn-out" class="btn btn-danger w-100 d-none"><i class="bi bi-box-arrow-right me-1"></i>Départ</button></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Résumé du jour -->
      <div class="col-lg-4">
        <div class="card p-4 shadow-sm h-100">
          <h6 class="mb-2"><i class="bi bi-sun me-2"></i>Aujourd'hui</h6>
          <div class="d-flex align-items-baseline gap-2">
            <span class="display-6 fw-bold" id="today-presence">0h</span>
            <span class="text-muted">présent / <span id="today-planned">0h</span> prévues</span>
          </div>
          <div class="progress mt-2" style="height:10px"><div id="today-progress" class="progress-bar" style="width:0%"></div></div>
          <div class="d-flex justify-content-between mt-2 small flex-wrap gap-2">
            <span class="text-muted"><i class="bi bi-briefcase me-1"></i>Travaillé <b id="today-worked">0h</b></span>
            <span class="text-muted"><i class="bi bi-cup-hot me-1"></i>Pause <b id="today-break">0h</b></span>
            <span class="text-muted"><i class="bi bi-list-check me-1"></i><b id="today-segments">0</b></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Timeline du jour -->
    <div class="card p-4 shadow-sm mt-3">
      <h6 class="mb-3"><i class="bi bi-hourglass-split me-2"></i>Déroulé de la journée</h6>
      <ul id="segments" class="timeline list-unstyled mb-0"></ul>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/pointage.js"></script>
</body>
</html>
