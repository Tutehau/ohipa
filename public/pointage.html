<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pointage | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <nav id="topnav" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"></nav>
  <div class="container">
    <h2 class="mb-4"><i class="bi bi-fingerprint me-2"></i>Pointage</h2>
    <div id="alert" class="d-none" role="alert"></div>

    <div class="row g-3">
      <!-- Carte de pointage -->
      <div class="col-md-5">
        <div class="card p-4 shadow-sm text-center">
          <div class="text-muted small mb-1"><i class="bi bi-clock me-1"></i>Statut</div>
          <div id="status-label" class="fs-5 fw-semibold mb-1">—</div>
          <div id="live-timer" class="display-6 fw-bold mb-3" style="font-variant-numeric:tabular-nums">00:00:00</div>

          <div class="mb-3 text-start">
            <label class="form-label">Société</label>
            <div class="input-group">
              <select id="company-select" class="form-select"></select>
              <button class="btn btn-outline-light" id="btn-add-company" type="button" title="Nouvelle société">
                <i class="bi bi-plus-lg"></i>
              </button>
            </div>
          </div>

          <button id="btn-in" class="btn btn-success btn-lg w-100 mb-2">
            <i class="bi bi-box-arrow-in-right me-1"></i>Pointer l'arrivée
          </button>
          <button id="btn-out" class="btn btn-danger btn-lg w-100 d-none">
            <i class="bi bi-box-arrow-right me-1"></i>Pointer le départ
          </button>
        </div>
      </div>

      <!-- Segments du jour -->
      <div class="col-md-7">
        <div class="card p-4 shadow-sm">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0"><i class="bi bi-list-check me-2"></i>Aujourd'hui</h5>
            <span class="badge bg-primary fs-6" id="today-total">0h</span>
          </div>
          <ul id="segments" class="list-group list-group-flush"></ul>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/pointage.js"></script>
</body>
</html>
