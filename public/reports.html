<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapports | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <nav id="topnav" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"></nav>
  <div class="container">
    <h2 class="mb-4"><i class="bi bi-bar-chart-line me-2"></i>Rapports</h2>

    <!-- Filtres -->
    <div class="card p-3 mb-4 shadow-sm">
      <form id="filter-form" class="row g-2 align-items-end">
        <div class="col-6 col-md-3">
          <label class="form-label">Du</label>
          <input type="date" id="f-from" class="form-control">
        </div>
        <div class="col-6 col-md-3">
          <label class="form-label">Au</label>
          <input type="date" id="f-to" class="form-control">
        </div>
        <div class="col-6 col-md-3">
          <label class="form-label">Entreprise</label>
          <select id="f-company" class="form-select"><option value="">Toutes</option></select>
        </div>
        <div class="col-6 col-md-3" id="f-user-wrap" style="display:none">
          <label class="form-label">Utilisateur</label>
          <select id="f-user" class="form-select"><option value="">Tous</option></select>
        </div>
        <div class="col-12 col-md-auto d-flex gap-2">
          <button type="submit" class="btn btn-primary"><i class="bi bi-funnel me-1"></i>Filtrer</button>
          <button type="button" id="btn-reset" class="btn btn-outline-light"><i class="bi bi-x-lg"></i></button>
          <a id="btn-export" class="btn btn-outline-light" href="#"><i class="bi bi-download me-1"></i>CSV</a>
        </div>
      </form>
    </div>

    <!-- Totaux -->
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="card stat-card p-3 shadow-sm">
          <small class="text-muted"><i class="bi bi-clock me-1"></i>Total des heures</small>
          <h3 id="t-hours">0h</h3>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card stat-card p-3 shadow-sm" style="border-left-color:#00c6ff">
          <small class="text-muted"><i class="bi bi-list-check me-1"></i>Nombre de saisies</small>
          <h3 id="t-count">0</h3>
        </div>
      </div>
    </div>

    <!-- Graphique par jour -->
    <div class="card p-4 mb-4 shadow-sm">
      <h5 class="mb-3"><i class="bi bi-graph-up me-2"></i>Heures par jour</h5>
      <canvas id="chart-day" height="110"></canvas>
    </div>

    <div class="row g-3 mb-5">
      <div class="col-md-6">
        <div class="card p-4 shadow-sm h-100">
          <h5 class="mb-3"><i class="bi bi-building me-2"></i>Par entreprise</h5>
          <ul id="by-company" class="list-group list-group-flush"></ul>
        </div>
      </div>
      <div class="col-md-6" id="by-user-card" style="display:none">
        <div class="card p-4 shadow-sm h-100">
          <h5 class="mb-3"><i class="bi bi-people me-2"></i>Par utilisateur</h5>
          <ul id="by-user" class="list-group list-group-flush"></ul>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/reports.js"></script>
</body>
</html>
