<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#05070f">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ohipa">
  <title>Tableau de bord | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <nav id="topnav" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"></nav>
  <div class="container pb-4">

    <!-- En-tête -->
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-2 mb-4">
      <div>
        <h2 class="mb-0" id="greeting">Bonjour</h2>
        <div class="text-muted" id="today-date"></div>
      </div>
    </div>

    <div class="row g-3">
      <!-- HERO : pointage en direct -->
      <div class="col-lg-8">
        <div class="card hero-card p-4 shadow-sm h-100">
          <div class="row align-items-center g-4">
            <div class="col-sm-6 text-center text-sm-start">
              <div class="text-muted small mb-1"><i class="bi bi-clock me-1"></i><span id="hero-status-label">Statut</span></div>
              <div id="hero-status" class="fs-5 fw-semibold mb-1">—</div>
              <div id="hero-timer" class="hero-timer" style="font-variant-numeric:tabular-nums">00:00:00</div>
            </div>
            <div class="col-sm-6">
              <label class="form-label" id="company-label">Société</label>
              <div class="input-group mb-2">
                <select id="company-select" class="form-select"></select>
                <button class="btn btn-outline-light" id="btn-add-company" type="button" title="Nouvelle société"><i class="bi bi-plus-lg"></i></button>
              </div>
              <div class="d-grid gap-2">
                <button id="btn-in" class="btn btn-success btn-lg d-none"><i class="bi bi-box-arrow-in-right me-1"></i>Pointer l'arrivée</button>
                <button id="btn-resume" class="btn btn-success btn-lg d-none"><i class="bi bi-play-fill me-1"></i>Reprendre</button>
                <div class="row g-2">
                  <div class="col"><button id="btn-pause" class="btn btn-warning w-100 d-none"><i class="bi bi-pause-fill me-1"></i>Pause</button></div>
                  <div class="col"><button id="btn-out" class="btn btn-danger w-100 d-none"><i class="bi bi-box-arrow-right me-1"></i>Départ</button></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- SEMAINE : réel vs prévu -->
      <div class="col-lg-4">
        <div class="card p-4 shadow-sm h-100">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="mb-0"><i class="bi bi-calendar-range me-2"></i>Cette semaine</h6>
            <span class="badge" id="week-ecart-badge">—</span>
          </div>
          <div class="d-flex align-items-baseline gap-2">
            <span class="display-6 fw-bold" id="week-real">0h</span>
            <span class="text-muted">/ <span id="week-planned">0h</span> prévues</span>
          </div>
          <div class="progress mt-2" style="height:10px">
            <div id="week-progress" class="progress-bar" style="width:0%"></div>
          </div>
          <div class="text-muted small mt-2" id="week-hint"></div>
        </div>
      </div>
    </div>

    <!-- Tuiles -->
    <div class="row g-3 mt-1">
      <div class="col-md-4">
        <div class="card stat-card p-3 shadow-sm">
          <small class="text-muted"><i class="bi bi-sun me-1"></i>Aujourd'hui</small>
          <h3 id="today-real">0h</h3>
          <small class="text-muted" id="today-break">Pause 0h</small>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card stat-card p-3 shadow-sm" style="border-left-color:#00c6ff">
          <small class="text-muted"><i class="bi bi-fingerprint me-1"></i>Segments cette semaine</small>
          <h3 id="week-count">0</h3>
          <small class="text-muted">pointages</small>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card stat-card p-3 shadow-sm" style="border-left-color:#ff8a5c">
          <small class="text-muted"><i class="bi bi-calendar-event me-1"></i>Prochain créneau</small>
          <h3 id="next-slot" class="fs-4">—</h3>
          <small class="text-muted" id="next-slot-sub"></small>
        </div>
      </div>
    </div>

    <div class="row g-3 mt-1">
      <!-- Graphique semaine -->
      <div class="col-lg-8">
        <div class="card p-4 shadow-sm h-100">
          <h6 class="mb-3"><i class="bi bi-bar-chart-line me-2"></i>Heures de la semaine</h6>
          <canvas id="week-chart" height="130"></canvas>
        </div>
      </div>
      <!-- Actions rapides -->
      <div class="col-lg-4">
        <div class="card p-4 shadow-sm h-100">
          <h6 class="mb-3"><i class="bi bi-grid me-2"></i>Accès rapide</h6>
          <div class="d-grid gap-2">
            <a href="pointage.html" class="btn btn-outline-light text-start"><i class="bi bi-fingerprint me-2 text-info"></i>Pointage</a>
            <a href="planning.html" class="btn btn-outline-light text-start"><i class="bi bi-calendar-week me-2 text-primary"></i>Mon planning</a>
            <a href="reports.html" class="btn btn-outline-light text-start"><i class="bi bi-clipboard-check me-2 text-warning"></i>Prévu vs Réel</a>
            <a href="history.html" class="btn btn-outline-light text-start"><i class="bi bi-list-ul me-2 text-success"></i>Historique</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="alert" class="alert-toast d-none" role="alert"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4" crossorigin="anonymous"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
