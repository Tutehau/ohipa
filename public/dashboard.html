<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <nav id="topnav" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"></nav>
  <div class="container">
    <h2 class="mb-4"><i class="bi bi-speedometer2 me-2"></i>Tableau de bord</h2>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="card stat-card p-3 shadow-sm">
          <small class="text-muted"><i class="bi bi-clock me-1"></i>Total pointé (réel)</small>
          <h3 id="stat-hours">0h</h3>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card stat-card p-3 shadow-sm" style="border-left-color:#198754">
          <small class="text-muted"><i class="bi bi-fingerprint me-1"></i>Segments pointés</small>
          <h3 id="stat-entries">0</h3>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card stat-card p-3 shadow-sm" style="border-left-color:#ffc107">
          <small class="text-muted"><i class="bi bi-calendar-event me-1"></i>Dernier pointage</small>
          <h3 id="stat-last">—</h3>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-md-6 col-lg-4">
        <a href="pointage.html" class="text-decoration-none">
          <div class="card p-4 shadow-sm h-100">
            <h5 class="text-dark"><i class="bi bi-fingerprint text-info me-2"></i>Pointage</h5>
            <p class="text-muted mb-0">Pointer mon arrivée et mon départ.</p>
          </div>
        </a>
      </div>
      <div class="col-md-6 col-lg-4">
        <a href="planning.html" class="text-decoration-none">
          <div class="card p-4 shadow-sm h-100">
            <h5 class="text-dark"><i class="bi bi-calendar-week text-primary me-2"></i>Mon planning</h5>
            <p class="text-muted mb-0">Prévoir mes créneaux par société.</p>
          </div>
        </a>
      </div>
      <div class="col-md-6 col-lg-4">
        <a href="reports.html" class="text-decoration-none">
          <div class="card p-4 shadow-sm h-100">
            <h5 class="text-dark"><i class="bi bi-clipboard-check text-warning me-2"></i>Prévu vs Réel</h5>
            <p class="text-muted mb-0">Comparer mon planning et mon pointage.</p>
          </div>
        </a>
      </div>
      <div class="col-md-6 col-lg-4">
        <a href="history.html" class="text-decoration-none">
          <div class="card p-4 shadow-sm h-100">
            <h5 class="text-dark"><i class="bi bi-list-ul text-success me-2"></i>Historique</h5>
            <p class="text-muted mb-0">Consulter tous mes pointages passés.</p>
          </div>
        </a>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
