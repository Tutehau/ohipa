<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Installation | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="text-center mb-4">
        <img class="auth-logo" src="logo.png" alt="Ohipa">
        <h3 class="mt-2">Installation d'Ohipa</h3>
        <p class="text-muted small mb-0">Aucun administrateur détecté. Créez le super-administrateur pour démarrer.</p>
      </div>
      <div class="card shadow-sm p-4">
        <div id="alert" class="d-none" role="alert"></div>
        <form id="setup-form">
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-person me-1"></i>Nom d'utilisateur</label>
            <input type="text" id="setup-user" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-lock me-1"></i>Mot de passe</label>
            <input type="password" id="setup-pass" class="form-control" minlength="6" required>
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-key me-1"></i>Clé d'installation</label>
            <input type="password" id="setup-key" class="form-control" required>
            <div class="form-text">Valeur de <code>SETUP_KEY</code> définie dans le fichier <code>.env</code>.</div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-gear me-1"></i>Créer le super-administrateur
          </button>
        </form>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/setup.js"></script>
</body>
</html>
