<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="text-center mb-4">
        <img class="auth-logo" src="logo.png" alt="Ohipa">
        <h3 class="mt-2">Ohipa</h3>
      </div>
      <div class="card shadow-sm p-4">
        <h5 class="mb-3"><i class="bi bi-box-arrow-in-right me-2"></i>Connexion</h5>
        <div id="alert" class="d-none" role="alert"></div>
        <form id="login-form">
          <div class="mb-3">
            <label class="form-label">Utilisateur</label>
            <input type="text" id="login-user" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" id="login-pass" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Se connecter
          </button>
        </form>
        <div class="d-flex justify-content-between mt-3 small">
          <a href="register.html" class="text-decoration-none">
            <i class="bi bi-person-plus me-1"></i>Créer un compte
          </a>
          <a href="reset-password.html" class="text-decoration-none">
            <i class="bi bi-key me-1"></i>Mot de passe oublié&nbsp;?
          </a>
        </div>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
