<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saisir des heures | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <nav id="topnav" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"></nav>
  <div class="container">
    <h2 class="mb-4"><i class="bi bi-clock-history me-2"></i>Saisir des heures</h2>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow-sm">
          <div id="alert" class="d-none" role="alert"></div>
          <form id="entry-form">
            <div class="mb-3">
              <label class="form-label"><i class="bi bi-building me-1"></i>Entreprise</label>
              <select id="company-select" class="form-select" required></select>
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="bi bi-clock me-1"></i>Heures</label>
              <input type="number" id="hours-input" class="form-control" step="0.25" min="0.25" max="24" required>
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="bi bi-card-text me-1"></i>Description</label>
              <textarea id="desc-input" class="form-control" rows="3" maxlength="500"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-save me-1"></i>Enregistrer
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/entry.js"></script>
</body>
</html>
