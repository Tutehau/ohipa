<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Entreprises | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
        <div class="brand mb-4 px-1"><img src="logo.png" alt="Ohipa"><span class="fw-bold fs-5">Ohipa</span></div>
        <ul class="nav flex-column gap-1">
          <li class="nav-item"><a class="nav-link" href="admin-dashboard.html"><i class="bi bi-graph-up"></i>Tableau de bord</a></li>
          <li class="nav-item"><a class="nav-link" href="admin-users.html"><i class="bi bi-people"></i>Utilisateurs</a></li>
          <li class="nav-item"><a class="nav-link active" href="admin-companies.html"><i class="bi bi-building"></i>Entreprises</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-bar-chart-line"></i>Rapports</a></li>
          <li class="nav-item mt-3"><a class="nav-link text-warning" href="dashboard.html"><i class="bi bi-arrow-left"></i>Espace utilisateur</a></li>
          <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i>Déconnexion</a></li>
        </ul>
      </nav>

      <main class="col-md-9 col-lg-10 ms-sm-auto p-4">
        <h2 class="mb-4"><i class="bi bi-building me-2"></i>Gestion des entreprises</h2>

        <div class="card p-4 mb-4 shadow-sm">
          <h5 class="mb-3"><i class="bi bi-plus-circle me-2"></i>Ajouter une entreprise</h5>
          <div id="alert" class="d-none" role="alert"></div>
          <form id="company-form" class="row g-2">
            <div class="col-md-10"><input type="text" id="comp-name" class="form-control" placeholder="Nom de l'entreprise" required></div>
            <div class="col-md-2"><button type="submit" class="btn btn-primary w-100"><i class="bi bi-plus-lg me-1"></i>Ajouter</button></div>
          </form>
        </div>

        <div class="card p-4 shadow-sm">
          <h5 class="mb-3"><i class="bi bi-list-ul me-2"></i>Liste des entreprises</h5>
          <ul id="company-list" class="list-group list-group-flush"></ul>
        </div>
      </main>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/admin-companies.js"></script>
</body>
</html>
