<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- Empêche toute fuite de l'URL (jeton) vers les hôtes externes (CDN). -->
  <meta name="referrer" content="no-referrer">
  <title>Badgeuse | Ohipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="kiosk-wrap">
    <!-- Écran de configuration (jeton d'appareil) -->
    <div id="setup" class="kiosk-card d-none">
      <img class="auth-logo mb-3" src="logo.png" alt="Ohipa">
      <h4 class="mb-2">Configurer la badgeuse</h4>
      <p class="text-muted small">Collez le jeton du kiosque (fourni dans l'administration).</p>
      <div id="setup-alert" class="alert d-none py-2"></div>
      <input type="text" id="setup-token" class="form-control text-center mb-3" placeholder="Jeton du kiosque" autocomplete="off">
      <button id="setup-btn" class="btn btn-primary w-100"><i class="bi bi-power me-1"></i>Activer</button>
    </div>

    <!-- Écran badgeuse -->
    <div id="pad" class="kiosk-card d-none">
      <div class="d-flex align-items-center justify-content-center gap-2 mb-1">
        <img src="logo.png" alt="" style="height:34px">
        <span class="fs-5 fw-bold">Ohipa</span>
      </div>
      <div id="kiosk-label" class="text-muted small mb-2"></div>
      <div id="clock" class="display-6 fw-bold mb-1" style="font-variant-numeric:tabular-nums"></div>

      <div id="pin-dots" class="pin-dots mb-3"></div>

      <div class="keypad">
        <button class="key" data-k="1">1</button>
        <button class="key" data-k="2">2</button>
        <button class="key" data-k="3">3</button>
        <button class="key" data-k="4">4</button>
        <button class="key" data-k="5">5</button>
        <button class="key" data-k="6">6</button>
        <button class="key" data-k="7">7</button>
        <button class="key" data-k="8">8</button>
        <button class="key" data-k="9">9</button>
        <button class="key key-muted" data-act="clear"><i class="bi bi-x-lg"></i></button>
        <button class="key" data-k="0">0</button>
        <button class="key key-ok" data-act="punch"><i class="bi bi-fingerprint"></i></button>
      </div>
    </div>

    <!-- Retour visuel plein écran -->
    <div id="feedback" class="kiosk-feedback d-none">
      <i id="fb-icon" class="bi"></i>
      <div id="fb-title" class="fs-1 fw-bold mt-2"></div>
      <div id="fb-sub" class="fs-4"></div>
    </div>
  </div>

  <script src="js/kiosk.js"></script>
</body>
</html>
