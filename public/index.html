<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#05070f">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ohipa">
  <title>Ohipa</title>
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <script src="js/splash.js"></script>
  <script>
    // Point d'entrée : sans administrateur => installation ; sinon => tableau de bord.
    (async () => {
      try {
        const res = await fetch('/api/admin-exists');
        const { exists } = await res.json();
        window.location.replace(exists ? 'dashboard.html' : 'setup.html');
      } catch {
        window.location.replace('login.html');
      }
    })();
  </script>
</body>
</html>
