name: CI & Déploiement Coolify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    name: Déploiement
    needs: test
    # Déploie uniquement sur push vers main (jamais sur une pull request).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher le redéploiement Coolify
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "https://coolify.tutehau.cloud/api/v1/deploy?uuid=twsa1mafn5vpmk2vy5474pde&force=true"
